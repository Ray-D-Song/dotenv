# Enable mouse support
set -g mouse on

# Mouse copy mode — hold Shift to bypass mouse for native terminal selection
# Use vi-style keys in copy mode
setw -g mode-keys vi

# OSC 52 clipboard — works in many modern terminals (kitty, wezterm, iTerm2, etc.)
# Set this before platform-specific pipe commands as a base
set -g set-clipboard on

# ---------------------------------------------------------------------------
# Mouse-drag-to-copy — pipes selected text to the system clipboard
# Platform detection via if-shell, evaluated at config load time
# ---------------------------------------------------------------------------

# macOS (pbcopy)
if-shell 'test "$(uname)" = "Darwin"' {
  bind-key -T copy-mode-vi MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode    MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode    MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "pbcopy"
}

# WSL2 (clip.exe via Windows host)
if-shell 'test -f /proc/sys/fs/binfmt_misc/WSLInterop' {
  bind-key -T copy-mode-vi MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "clip.exe"
  bind-key -T copy-mode-vi MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "clip.exe"
  bind-key -T copy-mode    MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "clip.exe"
  bind-key -T copy-mode    MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "clip.exe"
}

# Linux Wayland (wl-copy from wl-clipboard)
if-shell 'test "$(uname)" = "Linux" -a -n "$WAYLAND_DISPLAY" -a ! -f /proc/sys/fs/binfmt_misc/WSLInterop' {
  bind-key -T copy-mode-vi MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "wl-copy"
  bind-key -T copy-mode-vi MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "wl-copy"
  bind-key -T copy-mode    MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "wl-copy"
  bind-key -T copy-mode    MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "wl-copy"
}

# Linux X11 (xclip — requires xclip installed)
if-shell 'test "$(uname)" = "Linux" -a -z "$WAYLAND_DISPLAY" -a ! -f /proc/sys/fs/binfmt_misc/WSLInterop' {
  bind-key -T copy-mode-vi MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind-key -T copy-mode-vi MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind-key -T copy-mode    MouseDragEnd1Pane   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind-key -T copy-mode    MouseDragEnd1Border send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

# Boost scroll speed
set -g mouse-scroll-vertical 5

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Faster command sequence
set -sg escape-time 10

# Increase scrollback buffer
set -g history-limit 50000

# Modern features
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
